<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Pagina mia</title>
</head>
<body>
   <h1>Información de empleado</h1>
    <ul>
        <li><strong>Nombre:</strong> <span th:text="${empleados.nombre}"></span></li>
        <li><strong>Apellido:</strong> <span th:text="${empleados.apellido}"></span></li>
        <li><strong>Dirección:</strong> <span th:text="${empleados.direccion}"></span></li>
        <li><strong>Puesto:</strong> <span th:text="${empleados.puesto}"></span></li>
        <li><strong>Edad:</strong> <span th:text="${empleados.edad}"></span></li>
        <li><strong>Teléfono:</strong> <span th:text="${empleados.telefono}"></span></li>
        <li><strong>ID:</strong> <span th:text="${empleados.id}"></span></li>
    </ul>
</body>
</html>
